
<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Arena Game</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0b1020;
      font-family: Arial, sans-serif;
      color: white;
    }
    #game {
      display: block;
      width: 100vw;
      height: 100vh;
      background: radial-gradient(circle at center, #141b33 0%, #0b1020 70%);
    }
    #hud {
      position: fixed;
      top: 12px;
      left: 12px;
      z-index: 10;
      background: rgba(0,0,0,0.35);
      padding: 10px 12px;
      border-radius: 10px;
      backdrop-filter: blur(6px);
      font-size: 14px;
      line-height: 1.5;
    }
    #joinBox {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      background: rgba(0,0,0,0.55);
      z-index: 20;
    }
    .panel {
      background: #111827;
      padding: 24px;
      border-radius: 16px;
      width: min(92vw, 360px);
      box-shadow: 0 10px 40px rgba(0,0,0,0.4);
    }
    .panel h1 {
      margin: 0 0 16px;
      font-size: 24px;
    }
    .panel input, .panel button, .panel select {
      width: 100%;
      box-sizing: border-box;
      padding: 12px 14px;
      margin-top: 10px;
      border-radius: 10px;
      border: 0;
      outline: none;
      font-size: 16px;
    }
    .panel button {
      background: #22c55e;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }
    .hint {
      opacity: 0.8;
      margin-top: 12px;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <canvas id="game"></canvas>

  <div id="hud">
    <div id="status">Connecting...</div>
    <div id="score">Score: 0</div>
    <div id="length">Length: 10</div>
  </div>

  <div id="joinBox">
    <div class="panel">
      <h1>Arena Game</h1>
      <input id="name" maxlength="16" placeholder="Your name" />
      <select id="skin">
        <option value="neon">Neon</option>
        <option value="fire">Fire</option>
        <option value="ice">Ice</option>
        <option value="gold">Gold</option>
      </select>
      <button id="joinBtn">Join Game</button>
      <div class="hint">Move mouse to steer. Hold Space to boost.</div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="client.js"></script>
</body>
